name: Build Check

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --quiet coverage
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found — skipping install"
          fi

      - name: Ensure tests directory exists
        run: |
          if [ ! -d "tests" ]; then
            echo "❌ tests/ directory missing. Code without tests is incomplete (Rule 2c)."
            exit 1
          fi
          if [ -z "$(ls -A tests/)" ]; then
            echo "❌ tests/ directory is empty. Add unit, API, or UX tests."
            exit 1
          fi

      - name: Run unit tests with coverage
        run: |
          echo "--- Running unit tests ---"
          if [ -d "tests/unit" ]; then
            python -m coverage run -m unittest discover tests/unit -v
          else
            python -m coverage run -m unittest discover tests -v
          fi
          python -m coverage report --include="src/*" || python -m coverage report
          # Warn (do not fail) if coverage is below the 70% target in system.yaml
          python3 - <<'PYEOF'
          import subprocess, sys
          result = subprocess.run(
              ['python', '-m', 'coverage', 'json', '-o', '/tmp/coverage.json', '--include=src/*'],
              capture_output=True
          )
          if result.returncode != 0:
              print('ℹ️  Could not parse coverage data — skipping coverage threshold check')
              sys.exit(0)
          import json
          data = json.load(open('/tmp/coverage.json'))
          pct = data.get('totals', {}).get('percent_covered', 0)
          print(f'Coverage: {pct:.1f}%')
          if pct < 70:
              print(f'⚠️  Coverage {pct:.1f}% is below the 70% target in system.yaml.')
              print('   Add tests to raise coverage before merging.')
          else:
              print(f'✅ Coverage {pct:.1f}% meets the ≥70% target.')
          PYEOF

      - name: Run API tests
        run: |
          echo "--- Running API tests ---"
          if [ -d "tests/api" ]; then
            python -m unittest discover tests/api -v
          else
            echo "ℹ️  No tests/api/ directory found — skipping API tests"
            echo "    Create tests/api/ to add backend API test coverage (Rule 2c)"
          fi

      - name: Run UX / flow tests
        run: |
          echo "--- Running UX / flow tests ---"
          if [ -d "tests/ux" ]; then
            python -m unittest discover tests/ux -v
          else
            echo "ℹ️  No tests/ux/ directory found — skipping UX tests"
            echo "    Create tests/ux/ to add user experience test coverage (Rule 2c)"
          fi
