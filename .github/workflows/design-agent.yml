name: Design Agent (Rule 1)

# Triggers on:
#   1. A Feature Request issue is opened (auto-labelled 'enhancement' by the template)
#   2. Someone manually adds a 'needs-design' label to any issue
on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write

jobs:
  generate-design:
    if: |
      (github.event.action == 'opened' && contains(toJson(github.event.issue.labels), 'enhancement')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'needs-design')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Design Proposal with ChatGPT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEATURE_TITLE: ${{ github.event.issue.title }}
          FEATURE_BODY: ${{ github.event.issue.body }}
          FEATURE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, sys

          # Load the design agent system prompt
          system_prompt = open('.ai/chatgpt-design-agent.md').read()

          # Load the Design Proposal template so ChatGPT fills in the exact structure
          raw_template = open('.github/ISSUE_TEMPLATE/design_proposal.md').read()
          # Strip YAML frontmatter
          parts = raw_template.split('---')
          template_body = parts[2].strip() if len(parts) >= 3 else raw_template

          user_message = f"""Feature Request #{os.environ['FEATURE_NUMBER']}: {os.environ['FEATURE_TITLE']}

{os.environ['FEATURE_BODY']}

---

Produce a complete Design Proposal by filling in every section of this template.
Do not skip any section. Return only the filled template — no preamble.

Template:

{template_body}"""

          payload = json.dumps({
              "model": "gpt-4o",
              "max_tokens": 2000,
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_message}
              ]
          }).encode()

          req = urllib.request.Request(
              'https://api.openai.com/v1/chat/completions',
              data=payload,
              headers={
                  'Authorization': f'Bearer {os.environ["OPENAI_API_KEY"]}',
                  'Content-Type': 'application/json'
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except Exception as e:
              print(f'❌ OpenAI API call failed: {e}')
              sys.exit(1)

          if 'error' in data:
              print(f'❌ OpenAI API error: {data["error"]}')
              sys.exit(1)

          design = data['choices'][0]['message']['content']

          with open('design_proposal.txt', 'w') as f:
              f.write(design)

          print('✅ Design Proposal generated successfully')
          PYEOF

      - name: Create Design Proposal issue and link back
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const design = fs.readFileSync('design_proposal.txt', 'utf8');
            const featureNumber = context.issue.number;
            const rawTitle = context.payload.issue.title;

            const designTitle = rawTitle
              .replace(/^\[FEATURE\]\s*/i, '')
              .replace(/^\[BUG\]\s*/i, '')
              .trim();

            const body = [
              '> 🤖 Auto-generated by ChatGPT Design Agent (Rule 1)',
              `> Source: Feature Request #${featureNumber}`,
              '> **Needs human review and approval before Claude builds (Rule 2)**',
              '',
              '---',
              '',
              design
            ].join('\n');

            const proposal = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DESIGN] ${designTitle}`,
              body,
              labels: ['design', 'needs-approval'],
              assignees: ['ramrayavarapu']
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: featureNumber,
              body: [
                '🤖 **Design Agent (Rule 1)** has automatically generated a Design Proposal.',
                '',
                `👉 **Review and approve: #${proposal.data.number}**`,
                '',
                'Once you approve the design, assign Claude to build (Rule 2).',
                'Do not start building until the design issue is approved.'
              ].join('\n')
            });

            console.log(`✅ Design Proposal created: #${proposal.data.number}`);
