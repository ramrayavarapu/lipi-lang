name: Deploy Gate

on:
  push:
    branches:
      - main

permissions:
  checks: read
  statuses: read

jobs:
  deploy-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required checks passed on this commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, sys

          token  = os.environ['GITHUB_TOKEN']
          repo   = os.environ['GITHUB_REPOSITORY']
          sha    = os.environ['COMMIT_SHA']

          REQUIRED = {'build-check', 'secret-scan', 'docs-check', 'ai-review'}

          def gh_get(path):
              req = urllib.request.Request(
                  f'https://api.github.com{path}',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          runs = gh_get(f'/repos/{repo}/commits/{sha}/check-runs')
          results = {}
          for run in runs.get('check_runs', []):
              name   = run['name']
              status = run['status']
              concl  = run.get('conclusion', '')
              if name in REQUIRED:
                  results[name] = (status, concl)

          all_passed = True
          for check in REQUIRED:
              status, concl = results.get(check, ('missing', ''))
              if status == 'completed' and concl == 'success':
                  print(f'✅ {check}: passed')
              elif status == 'missing':
                  print(f'❌ {check}: not found — check has not run on this commit')
                  all_passed = False
              elif status in ('queued', 'in_progress'):
                  print(f'❌ {check}: still {status} — deploy gate must run after all checks complete')
                  all_passed = False
              else:
                  print(f'❌ {check}: {status}/{concl or "no conclusion"}')
                  all_passed = False

          if not all_passed:
              print('\n🚫 Deploy gate FAILED — not all required checks passed.')
              sys.exit(1)

          print('\n🚀 All required checks passed — deployment can proceed.')
          PYEOF
