name: Deploy Gate

on:
  push:
    branches:
      - main

permissions:
  checks: read
  statuses: read
  pull-requests: read

jobs:
  deploy-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Verify required checks passed on the merged PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, sys, time

          token  = os.environ['GITHUB_TOKEN']
          repo   = os.environ['GITHUB_REPOSITORY']
          sha    = os.environ['COMMIT_SHA']

          # Job names as defined in build-check.yml ('build'), secret-scan.yml ('scan'), docs-check.yml ('docs')
          REQUIRED = {'build', 'scan', 'docs'}

          def gh_get(path):
              req = urllib.request.Request(
                  f'https://api.github.com{path}',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          def gh_get_with_retry(path, attempts=3):
              """Retry with exponential backoff: 2s, 4s."""
              for attempt in range(1, attempts + 1):
                  try:
                      return gh_get(path)
                  except (urllib.error.HTTPError, urllib.error.URLError, OSError) as e:
                      if attempt == attempts:
                          raise
                      wait = 2 ** attempt
                      print(f'⚠️  API call failed (attempt {attempt}/{attempts}): {e} — retrying in {wait}s')
                      time.sleep(wait)

          # CI checks run on the PR head commit, not the merge commit.
          # Find the PR associated with this merge and use its head SHA.
          try:
              prs = gh_get_with_retry(f'/repos/{repo}/commits/{sha}/pulls')
          except Exception as e:
              print(f'❌ Could not resolve PR for merge commit {sha[:7]} after 3 attempts: {e}')
              print('   Deploy gate cannot verify required checks — failing to prevent unverified deployment.')
              sys.exit(1)

          if not prs:
              print(f'ℹ️  No PR found for merge commit {sha[:7]} — this appears to be a direct push.')
              print('   Skipping deploy gate (direct pushes bypass the PR review workflow by definition).')
              sys.exit(0)

          pr_sha = prs[0]['head']['sha']
          pr_number = prs[0]['number']
          print(f'ℹ️  Merge commit {sha[:7]} came from PR #{pr_number} (head {pr_sha[:7]})')

          try:
              runs = gh_get_with_retry(f'/repos/{repo}/commits/{pr_sha}/check-runs')
          except Exception as e:
              print(f'❌ Could not fetch check runs for PR #{pr_number} head {pr_sha[:7]}: {e}')
              sys.exit(1)

          results = {}
          for run in runs.get('check_runs', []):
              name  = run['name']
              status = run['status']
              concl  = run.get('conclusion', '')
              if name in REQUIRED:
                  results[name] = (status, concl)

          all_passed = True
          for check in REQUIRED:
              status, concl = results.get(check, ('missing', ''))
              if status == 'completed' and concl == 'success':
                  print(f'✅ {check}: passed')
              elif status == 'missing':
                  print(f'❌ {check}: not found — check has not run on PR #{pr_number}')
                  all_passed = False
              elif status in ('queued', 'in_progress'):
                  print(f'❌ {check}: still {status} — deploy gate must run after all checks complete')
                  all_passed = False
              else:
                  print(f'❌ {check}: {status}/{concl or "no conclusion"}')
                  all_passed = False

          if not all_passed:
              print('\n🚫 Deploy gate FAILED — not all required checks passed on PR #{pr_number}.')
              sys.exit(1)

          print('\n🚀 All required checks passed — deployment can proceed.')
          PYEOF
