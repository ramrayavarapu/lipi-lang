name: Claude Auto-fix (Rule 2 — Fix Copilot Review Issues)

on:
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    # Only run when Copilot requests changes on PRs from the same repo (not forks).
    # Fork PRs cannot access secrets safely — skip them to prevent exfiltration.
    if: |
      github.event.review.state == 'changes_requested' &&
      contains(github.event.review.user.login, 'copilot') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          # PAT is required here — GITHUB_TOKEN pushes do not trigger
          # pull_request CI workflows (GitHub security restriction).
          # CLAUDE_AUTOFIX_PAT is a fine-grained PAT with Contents: write
          # and Workflows: write. Its pushes are treated as user pushes,
          # so CI re-runs automatically after the autofix commit.
          token: ${{ secrets.CLAUDE_AUTOFIX_PAT }}

      - name: Collect Copilot review comments and generate fixes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.CLAUDE_AUTOFIX_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEW_BODY: ${{ github.event.review.body }}
          REVIEW_ID: ${{ github.event.review.id }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, sys, re

          token     = os.environ['GITHUB_TOKEN']
          repo      = os.environ['GITHUB_REPOSITORY']
          pr_number = os.environ['PR_NUMBER']
          api_key   = os.environ.get('ANTHROPIC_API_KEY', '').strip()

          if not api_key:
              print('❌ ANTHROPIC_API_KEY not set — cannot generate fixes')
              sys.exit(1)

          def gh_get(path):
              req = urllib.request.Request(
                  f'https://api.github.com{path}',
                  headers={
                      'Authorization': f'Bearer {token}',
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                  }
              )
              with urllib.request.urlopen(req) as resp:
                  return json.load(resp)

          # Gather inline review comments grouped by file
          all_comments = gh_get(f'/repos/{repo}/pulls/{pr_number}/comments')
          review_id    = int(os.environ['REVIEW_ID'])
          review_body  = os.environ.get('REVIEW_BODY', '').strip()

          by_file = {}
          for c in all_comments:
              if c.get('pull_request_review_id') == review_id:
                  path = c['path']
                  by_file.setdefault(path, []).append(
                      f"Line {c.get('line', c.get('original_line', '?'))}: {c['body']}"
                  )

          if not by_file and not review_body:
              print('ℹ️ No actionable inline comments found — nothing to fix')
              sys.exit(0)

          def call_claude(prompt):
              payload = json.dumps({
                  'model': 'claude-sonnet-4-6',
                  'max_tokens': 4096,
                  'messages': [{'role': 'user', 'content': prompt}]
              }).encode()
              req = urllib.request.Request(
                  'https://api.anthropic.com/v1/messages',
                  data=payload,
                  headers={
                      'x-api-key': api_key,
                      'anthropic-version': '2023-06-01',
                      'content-type': 'application/json',
                  }
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      data = json.load(resp)
              except urllib.error.HTTPError as e:
                  print(f'❌ Claude API error {e.code}: {e.read().decode()}')
                  sys.exit(1)
              return data['content'][0]['text']

          def strip_fences(text):
              # Remove optional ``` code fences Claude may wrap output in
              text = re.sub(r'^```[a-zA-Z]*\n', '', text.strip())
              text = re.sub(r'\n```$', '', text)
              return text.strip()

          fixes_applied = []
          skipped_large_files = []

          # Fix each file that has inline comments
          for file_path, comments in by_file.items():
              try:
                  original = open(file_path).read()
              except FileNotFoundError:
                  print(f'⚠️ Skipping {file_path} — not found in workspace')
                  continue

              comments_block = '\n'.join(f'- {c}' for c in comments)
              FILE_LIMIT = 8000
              if len(original) > FILE_LIMIT:
                  print(
                      f'⚠️  Skipping {file_path} — file is {len(original)} bytes, '
                      f'exceeding the {FILE_LIMIT}-byte auto-fix limit. '
                      f'Manual review is required to avoid truncating the file.'
                  )
                  skipped_large_files.append(file_path)
                  continue
              prompt = '\n'.join([
                  'You are fixing issues raised by a GitHub Copilot code review.',
                  '',
                  f'File: {file_path}',
                  '',
                  'Copilot review comments on this file:',
                  comments_block,
                  '',
                  'Current file content:',
                  original,
                  '',
                  'Output the COMPLETE fixed file content between these markers and nothing else:',
                  '===FIXED_CONTENT_START===',
                  '[your fixed file content here]',
                  '===FIXED_CONTENT_END===',
              ])

              response = call_claude(prompt)

              match = re.search(
                  r'===FIXED_CONTENT_START===\r?\n(.*?)\r?\n===FIXED_CONTENT_END===',
                  response.strip(), re.DOTALL
              )
              if not match:
                  print(f'⚠️ Claude did not return parseable content for {file_path} — skipping')
                  continue

              fixed = match.group(1)
              if fixed.strip() == original.strip():
                  print(f'ℹ️ No change needed for {file_path}')
                  continue

              with open(file_path, 'w') as f:
                  f.write(fixed)
              fixes_applied.append(file_path)
              print(f'✅ Fixed: {file_path}')

          # If only an overall review body and no inline comments, generate a summary fix
          if not by_file and review_body:
              print(f'ℹ️ Overall review comment only: {review_body[:200]}')
              print('No specific file to fix — human review required for overall feedback')

          with open('fixes_applied.txt', 'w') as f:
              f.write('\n'.join(fixes_applied))

          with open('skipped_large_files.txt', 'w') as f:
              f.write('\n'.join(skipped_large_files))

          PYEOF

      - name: Commit and push fixes
        run: |
          git config user.name  "Claude Auto-fix"
          git config user.email "claude-autofix@github-actions"

          if git diff --quiet; then
            echo "ℹ️ No file changes to commit"
            echo "NOTHING_FIXED=true" >> "$GITHUB_ENV"
          else
            git add -A
            git commit \
              -m "Auto-fix: address Copilot review issues (Rule 2)" \
              -m "$(sed 's/^/- Fixed: /' < fixes_applied.txt)"
            git push origin HEAD:"${{ github.event.pull_request.head.ref }}"
            echo "NOTHING_FIXED=false" >> "$GITHUB_ENV"
          fi

      - name: Comment on PR with fix summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const nothingFixed = process.env.NOTHING_FIXED === 'true';
            let fixedFiles = [];
            let skippedLargeFiles = [];
            try {
              fixedFiles = fs.readFileSync('fixes_applied.txt', 'utf8')
                .split('\n').filter(Boolean);
            } catch {}
            try {
              skippedLargeFiles = fs.readFileSync('skipped_large_files.txt', 'utf8')
                .split('\n').filter(Boolean);
            } catch {}

            let body;
            if (nothingFixed || fixedFiles.length === 0) {
              body = [
                '🤖 **Claude Auto-fix (Rule 2)** ran but found no automatically fixable issues.',
                '',
                ...(skippedLargeFiles.length
                  ? [
                      '**Skipped large files:**',
                      ...skippedLargeFiles.map(f => `- \`${f}\` (manual fix required; auto-fix skips files above the size limit)`),
                      ''
                    ]
                  : []),
                'The Copilot review may contain overall feedback that requires human judgement.',
                'Please review the Copilot comments and address them manually before requesting final approval.'
              ].join('\n');
            } else {
              body = [
                '🤖 **Claude Auto-fix (Rule 2)** has committed fixes for the Copilot review issues.',
                '',
                '**Files fixed:**',
                ...fixedFiles.map(f => `- \`${f}\``),
                '',
                ...(skippedLargeFiles.length
                  ? [
                      '**Skipped large files:**',
                      ...skippedLargeFiles.map(f => `- \`${f}\` (manual fix required; auto-fix skips files above the size limit)`),
                      ''
                    ]
                  : []),
                '**Next steps:**',
                '1. Review the auto-fix commit to confirm the changes are correct',
                '2. Re-run CI checks if needed',
                '3. Request final human approval to merge'
              ].join('\n');
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
