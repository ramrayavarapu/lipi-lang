name: Claude Preliminary Review (advisory)

# Runs Claude as a fast pre-check before Copilot's full review.
# The review is posted as a PR comment so the human approver sees it
# before deciding whether to approve (Rule 4).
#
# This check ALWAYS exits 0 — it is advisory only.
# API/network errors produce an advisory fallback message rather than
# blocking the merge. To enforce that the check completes before a human
# can merge, add "ai-review" to the required status checks in:
#   Settings → Branches → Branch protection rules → Require status checks.

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write   # needed to post and update the review comment

jobs:
  ai-review:
    # Skip fork PRs — they receive a read-only token and no repo secrets,
    # so the Claude call and comment write would both fail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate diff
        id: diff_gen
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "Base SHA ${BASE_SHA} not found locally - attempting fetch by SHA"
            if ! git fetch --no-tags --deepen=50 origin "${BASE_SHA}"; then
              echo "Fetch by SHA failed - falling back to fetch by base ref origin/${BASE_REF}"
              git fetch --no-tags --deepen=50 origin "${BASE_REF}" || true
            fi
          fi

          if ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "⚠️ Unable to resolve base SHA — diff generation skipped."
            echo "empty=true" >> "$GITHUB_OUTPUT"
          else
            git diff "$BASE_SHA"...HEAD > diff.txt
            echo "--- Diff size: $(wc -l < diff.txt) lines ---"
            if [ ! -s diff.txt ]; then
              echo "empty=true" >> "$GITHUB_OUTPUT"
            else
              echo "empty=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Call Claude for AI review
        if: steps.diff_gen.outputs.empty == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, urllib.error, os, sys

          def write_summary(text):
              with open('review_summary.txt', 'w') as f:
                  f.write(text)

          api_key = os.environ.get('ANTHROPIC_API_KEY', '').strip()
          if not api_key:
              write_summary(
                  'AI review skipped — `ANTHROPIC_API_KEY` secret is not configured.\n\n'
                  'Add it in **Settings → Secrets → Actions** to enable Claude review.'
              )
              print('ℹ️ ANTHROPIC_API_KEY not set — skipping AI review')
              sys.exit(0)

          try:
              with open('diff.txt', 'r', encoding='utf-8', errors='replace') as diff_file:
                  diff_full = diff_file.read()
          except Exception as e:
              write_summary(f'AI review skipped — could not read diff: {e}')
              print(f'⚠️ Could not read diff.txt: {e}')
              sys.exit(0)
          DIFF_LIMIT = 8000
          truncated = len(diff_full) > DIFF_LIMIT
          if truncated:
              print(f'⚠️  Diff is {len(diff_full)} bytes — truncating to {DIFF_LIMIT} bytes.')
          diff = diff_full[:DIFF_LIMIT]
          truncation_note = (
              f'\n\n> ⚠️ Diff was truncated to {DIFF_LIMIT} bytes. Large PRs may have issues in the unseen portion.'
              if truncated else ''
          )

          payload = json.dumps({
              "model": "claude-sonnet-4-6",
              "max_tokens": 1024,
              "messages": [{
                  "role": "user",
                  "content": (
                      "You are a senior code reviewer. Review this code diff for:\n"
                      "1) Security vulnerabilities\n"
                      "2) Regression risks\n"
                      "3) Missing tests\n"
                      "4) Cost implications\n\n"
                      "Format your response as markdown with clear sections. "
                      "Label issues as **Blocking** or **Advisory**. Be concise.\n\n"
                      "Diff:\n" + diff
                  )
              }]
          }).encode()

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=payload,
              headers={
                  'x-api-key': api_key,
                  'anthropic-version': '2023-06-01',
                  'content-type': 'application/json',
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              msg = f'AI review unavailable — Anthropic API returned HTTP {e.code}.'
              write_summary(msg)
              print(f'⚠️ {msg}')
              sys.exit(0)
          except Exception as e:
              msg = f'AI review unavailable — request failed: {e}'
              write_summary(msg)
              print(f'⚠️ {msg}')
              sys.exit(0)

          content = data.get('content', [])
          review = '\n'.join([b.get('text', '') for b in content if b.get('type') == 'text'])
          review += truncation_note
          write_summary(review)

          print('=== AI REVIEW OUTPUT ===')
          print(review)
          PYEOF

      - name: Write skipped review summary
        if: steps.diff_gen.outputs.empty == 'true'
        run: echo "No diff — AI review skipped (no changes detected)." > review_summary.txt

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.existsSync('review_summary.txt')
              ? fs.readFileSync('review_summary.txt', 'utf8').trim()
              : 'AI review output not available.';

            const marker = '<!-- claude-ai-review -->';
            const body = [
              marker,
              '## 🤖 Claude AI Review (Rule 4 — read before approving)',
              '',
              review,
              '',
              '---',
              '_This review is advisory. You are responsible for reading it before approving._',
              '_Merge is gated by your approval — **do not approve without reading this.**_',
            ].join('\n');

            // Find and update an existing comment from a previous run, or create a new one.
            // Use per_page:100 so the marker search works on PRs with many comments.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              console.log(`✅ Updated existing AI review comment #${existing.id}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
              console.log(`✅ Posted AI review comment #${created.id}`);
            }
