name: Request Copilot Review (Rule 3)

on:
  pull_request:
    types: [opened, ready_for_review]
    branches:
      - main

permissions:
  pull-requests: write
  issues: write

jobs:
  request-review:
    runs-on: ubuntu-latest
    steps:
      - name: Request GitHub Copilot as reviewer
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;

            // Skip draft PRs
            if (pr.draft) {
              console.log('PR is a draft — skipping Copilot review request');
              return;
            }

            // Check if Copilot review already requested.
            // Match known Copilot bot identities: 'copilot[bot]', 'github-copilot[bot]', etc.
            const COPILOT_LOGINS = new Set(['copilot[bot]', 'github-copilot[bot]', 'github-copilot']);
            const isCopilot = (login) => COPILOT_LOGINS.has(login.toLowerCase()) || login.toLowerCase().startsWith('copilot');

            const { data: reviewers } = await github.rest.pulls.listRequestedReviewers({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            const alreadyRequested = reviewers.users.some(u => isCopilot(u.login));

            if (alreadyRequested) {
              console.log('Copilot review already requested — skipping');
              return;
            }

            // Request Copilot review via the standard reviewer API
            try {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: ['github-copilot[bot]']
              });
              console.log('✅ Copilot review requested');
            } catch (err) {
              // Copilot may not be enabled or the bot name differs — post a reminder instead
              console.log(`ℹ️ Could not auto-request Copilot review: ${err.message}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '## Rule 3 — Copilot Review Required',
                  '',
                  'GitHub Copilot review could not be auto-requested.',
                  'Please request a Copilot code review manually from the Reviewers panel before merging.',
                  '',
                  'Once Copilot submits its review, Claude will automatically fix any issues raised.'
                ].join('\n')
              });
            }
