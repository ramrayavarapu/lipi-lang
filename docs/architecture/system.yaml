# ─────────────────────────────────────────────────────────────
# system.yaml — Architecture Manifest
# Copy this file into any Prayag.io service repo and fill in
# the bracketed placeholders. Keep it up to date — docs-check
# CI will fail if this file is missing or empty.
# ─────────────────────────────────────────────────────────────

system: lipi-lang
version: "2.0"
purpose: >
  Telugu-based programming language interpreter with intelligent agentic engineering.
  Enables writing and executing code using Telugu script,
  making programming accessible to Telugu speakers.
  Enhanced with dynamic agent selection intelligence for adaptive task orchestration.

owner: ramrayavarapu
repository: https://github.com/ramrayavarapu/lipi-lang

# ── Environments ──────────────────────────────────────────────
# Uncomment and fill in for Prayag.io services
# environment:
#   production:  https://prayag.io
#   staging:     https://staging.prayag.io
#   local:       http://localhost:3000

# ── Components ────────────────────────────────────────────────
components:
  - name: parser
    type: language-parser
    description: Tokenises and parses Telugu-script source code
    language: python

  - name: executor
    type: runtime-engine
    description: Executes parsed abstract syntax tree
    language: python

  - name: runtime
    type: stdlib
    description: Standard library functions available in lipi-lang
    language: python

  - name: routing-intelligence
    type: ai-orchestrator
    description: Dynamic agent selection intelligence layer with machine learning
    language: python
    framework: custom
    capabilities:
      - Task classification and routing
      - Historical performance analysis
      - Outcome learning and adaptation
      - Agent capability matching
      - Fallback selection

  - name: agentic-orchestrator
    type: task-orchestrator
    description: Main orchestrator for intelligent task-to-agent assignment
    language: python
    dependencies: [routing-intelligence]

  - name: agent-cli
    type: cli-tool
    description: Command-line interface for testing and demonstrating agent selection
    language: python
    dependencies: [agentic-orchestrator]

  # Prayag.io template — add/remove components as needed:
  #
  # - name: api
  #   type: backend-api
  #   description: REST/GraphQL API layer
  #   language: python
  #   framework: fastapi
  #
  # - name: frontend
  #   type: web-ui
  #   description: User-facing web application
  #   language: typescript
  #   framework: react
  #
  # - name: infrastructure
  #   type: iac
  #   description: Terraform configuration for cloud infrastructure
  #   language: hcl

# ── Interfaces ────────────────────────────────────────────────
interfaces:
  - type: cli
    description: Command-line interpreter for running .lipi files

  - type: agent-cli
    description: Command-line interface for dynamic agent selection testing and demonstration

  # - type: rest-api
  #   description: [describe API surface]
  # - type: web
  #   description: [describe frontend interface]

# ── Dependencies ──────────────────────────────────────────────
dependencies:
  - name: python
    version: ">=3.11"
  - name: unittest
    purpose: test framework (stdlib)

# ── Security ──────────────────────────────────────────────────
security:
  input_validation: required
  secrets: none — no external API calls
  auth: none
  # auth: jwt            ← for Prayag.io services
  # secrets: env vars    ← never hardcoded

# ── Testing ───────────────────────────────────────────────────
testing:
  unit_tests: required          # tests/unit/ or tests/
  api_tests: required           # tests/api/  — for agent orchestrator APIs
  ux_tests: required            # tests/ux/   — for CLI and user workflows
  coverage_target: ">= 80%"
  test_files:
    - test_agent_intelligence.py   # Unit tests for AI decision logic
    - test_agentic_orchestrator.py # API tests for orchestrator behavior
    - test_agent_ux.py             # UX tests for user flows

# ── Cost Profile ──────────────────────────────────────────────
cost_profile:
  infrastructure: minimal — local execution only
  third_party_apis: none
  scaling_model: not applicable — local interpreter
  # For Prayag.io services, document:
  # infrastructure: [cloud provider + services used]
  # third_party_apis: [name, cost per call, monthly volume estimate]
  # scaling_model: [horizontal / vertical / serverless]

# ── Agentic Engineering ───────────────────────────────────────
agentic_engineering:
  enabled: true
  version: "2.0"
  
  # Static baseline agents (STANDARDS.md Rule 1-3)
  design_agent: chatgpt          # Rule 1 — architecture and design
  build_agent: claude            # Rule 2 — code, tests, infrastructure
  review_agent: github-copilot   # Rule 3 — security and regression review
  
  # Dynamic routing intelligence (NEW)
  routing_intelligence:
    enabled: true
    learning_enabled: true
    task_classification: automatic
    agent_selection: ml-enhanced
    fallback_strategy: standards-compliant
    memory_persistence: agent_memory.json
    
  # Specialized agents for complex scenarios
  specialized_agents:
    - security_specialist: enhanced-security-analysis
    - testing_specialist: comprehensive-test-coverage
    
  # Performance monitoring
  metrics:
    track_confidence_scores: true
    track_execution_time: true
    track_quality_scores: true
    learn_from_outcomes: true
    
  standards: STANDARDS.md
