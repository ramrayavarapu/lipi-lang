name: Secret Scan

on:
  pull_request:
    branches:
      - main

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secrets and credentials
        run: |
          echo "Scanning for hardcoded secrets (Rule 2b)..."
          FOUND=0

          # AWS keys
          if grep -RInE "AKIA[0-9A-Z]{16}" . --exclude-dir=.git --exclude="*.yml" --exclude="*.md"; then
            echo "❌ AWS Access Key detected"
            FOUND=1
          fi

          # Generic API keys (OpenAI, GitHub tokens, etc.)
          if grep -RInE "(sk-[a-zA-Z0-9]{32,}|ghp_[a-zA-Z0-9]{36})" . --exclude-dir=.git --exclude="*.md"; then
            echo "❌ API key pattern detected"
            FOUND=1
          fi

          # Private key blocks
          if grep -RIn "PRIVATE KEY" . --exclude-dir=.git --exclude="*.md"; then
            echo "❌ Private key block detected"
            FOUND=1
          fi

          # Hardcoded passwords
          if grep -RInE "password\s*=\s*['\"][^'\"]{4,}" . --exclude-dir=.git --exclude="*.md" --exclude="*.yml"; then
            echo "❌ Hardcoded password pattern detected"
            FOUND=1
          fi

          # Connection strings
          if grep -RInE "(mongodb|postgres|mysql):\/\/[^@]+:[^@]+@" . --exclude-dir=.git --exclude="*.md"; then
            echo "❌ Connection string with embedded credentials detected"
            FOUND=1
          fi

          if [ $FOUND -eq 1 ]; then
            echo ""
            echo "🚫 Secret scan FAILED. Remove all secrets and use environment variables."
            echo "   See STANDARDS.md Rule 2b."
            exit 1
          fi

          echo "✅ No secrets detected"
