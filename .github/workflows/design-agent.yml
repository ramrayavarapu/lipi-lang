name: Design Agent (Rule 1)

# Triggers on:
#   1. A Feature Request issue is opened (auto-labelled 'enhancement' by the template)
#   2. Someone manually adds a 'needs-design' label to any issue
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read  # required for actions/checkout
  issues: write   # required to create issues and comments

jobs:
  generate-design:
    # Only run for repo owner, members, and collaborators.
    # Prevents any GitHub user from triggering OpenAI API calls on a public repo.
    if: |
      (
        github.event.action == 'opened' &&
        contains(github.event.issue.labels.*.name, 'enhancement') &&
        (
          github.event.issue.author_association == 'OWNER' ||
          github.event.issue.author_association == 'MEMBER' ||
          github.event.issue.author_association == 'COLLABORATOR'
        )
      ) ||
      (
        github.event.action == 'labeled' &&
        github.event.label.name == 'needs-design' &&
        github.event.sender.login == github.repository_owner
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Generate Design Proposal with ChatGPT
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEATURE_TITLE: ${{ github.event.issue.title }}
          FEATURE_BODY: ${{ github.event.issue.body }}
          FEATURE_NUMBER: ${{ github.event.issue.number }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, urllib.error, sys

          api_key = os.environ.get('OPENAI_API_KEY', '').strip()
          if not api_key:
              print('❌ OPENAI_API_KEY secret is not set. Add it in repo Settings → Secrets.')
              sys.exit(1)

          # Load the design agent system prompt
          system_prompt = open('.ai/chatgpt-design-agent.md').read()

          # Load the Design Proposal template so ChatGPT fills in the exact structure
          raw_template = open('.github/ISSUE_TEMPLATE/design_proposal.md').read()
          # Strip YAML frontmatter
          parts = raw_template.split('---')
          template_body = parts[2].strip() if len(parts) >= 3 else raw_template

          # Cap input length to limit prompt injection surface and token cost.
          # User-controlled content is clearly delimited and sandboxed by the system prompt.
          title = os.environ.get('FEATURE_TITLE', '')[:200]
          body  = os.environ.get('FEATURE_BODY',  '')[:2000]

          user_message = (
              f"Feature Request #{os.environ['FEATURE_NUMBER']}: {title}\n\n"
              f"{body}\n\n"
              "---\n\n"
              "Produce a complete Design Proposal by filling in every section of this template.\n"
              "Do not skip any section. Return only the filled template — no preamble.\n\n"
              f"Template:\n\n{template_body}"
          )

          payload = json.dumps({
              "model": "gpt-4o",
              "max_tokens": 4096,
              "messages": [
                  {"role": "system", "content": system_prompt},
                  {"role": "user",   "content": user_message}
              ]
          }).encode()

          req = urllib.request.Request(
              'https://api.openai.com/v1/chat/completions',
              data=payload,
              headers={
                  'Authorization': f'Bearer {api_key}',
                  'Content-Type': 'application/json'
              }
          )

          try:
              with urllib.request.urlopen(req) as resp:
                  data = json.load(resp)
          except urllib.error.HTTPError as e:
              print(f'❌ OpenAI API error {e.code}: {e.read().decode()}')
              sys.exit(1)
          except Exception as e:
              print(f'❌ OpenAI API call failed: {e}')
              sys.exit(1)

          if 'error' in data:
              print(f'❌ OpenAI API error: {data["error"]}')
              sys.exit(1)

          design = data['choices'][0]['message']['content']

          with open('design_proposal.txt', 'w') as f:
              f.write(design)

          print('✅ Design Proposal generated successfully')
          PYEOF

      - name: Create Design Proposal issue and link back
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          DESIGN_ASSIGNEE: ${{ vars.DESIGN_ASSIGNEE }}
        with:
          script: |
            const fs = require('fs');
            const design = fs.readFileSync('design_proposal.txt', 'utf8');
            const featureNumber = context.issue.number;
            const rawTitle = context.payload.issue.title;

            const designTitle = rawTitle
              .replace(/^\[FEATURE\]\s*/i, '')
              .replace(/^\[BUG\]\s*/i, '')
              .trim();

            const body = [
              '> 🤖 Auto-generated by ChatGPT Design Agent (Rule 1)',
              `> Source: Feature Request #${featureNumber}`,
              '> **Needs human review and approval before Claude builds (Rule 2)**',
              '',
              '---',
              '',
              design
            ].join('\n');

            // Use the DESIGN_ASSIGNEE repo variable if set and assignable.
            // To configure: Settings → Variables → New repository variable → DESIGN_ASSIGNEE
            const configuredAssignee = process.env.DESIGN_ASSIGNEE?.trim();
            let assignees;
            if (configuredAssignee) {
              try {
                await github.request('GET /repos/{owner}/{repo}/assignees/{assignee}', {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  assignee: configuredAssignee
                });
                assignees = [configuredAssignee];
              } catch (error) {
                console.warn(
                  `⚠️ DESIGN_ASSIGNEE "${configuredAssignee}" is not assignable in this repository; ` +
                  'creating the design issue without an assignee.'
                );
              }
            }

            const proposal = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[DESIGN] ${designTitle}`,
              body,
              labels: ['design', 'needs-approval'],
              ...(assignees ? { assignees } : {})
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: featureNumber,
              body: [
                '🤖 **Design Agent (Rule 1)** has automatically generated a Design Proposal.',
                '',
                `👉 **Review and approve: #${proposal.data.number}**`,
                '',
                'Once you approve the design, assign Claude to build (Rule 2).',
                'Do not start building until the design issue is approved.'
              ].join('\n')
            });

            console.log(`✅ Design Proposal created: #${proposal.data.number}`);
